<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Smile When You Poop — Mobile Reader</title>
  <meta name="robots" content="noindex, nofollow" />

  <!-- Open Graph / Social Sharing -->
  <meta property="og:title" content="Smile When You Poop — Advance Reader Copy" />
  <meta property="og:description" content="How to Be Grateful When Life Is Hard" />
  <meta property="og:image" content="https://read.smilewhenyoupoop.com/share-image.jpg" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />
  <meta property="og:url" content="https://read.smilewhenyoupoop.com/" />
  <meta property="og:type" content="website" />

  <!-- Twitter/X Card -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Smile When You Poop — Advance Reader Copy" />
  <meta name="twitter:description" content="How to Be Grateful When Life Is Hard" />
  <meta name="twitter:image" content="https://read.smilewhenyoupoop.com/share-image.jpg" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    :root { --cream:#faf6f0; --tan:#e8ddd0; --dark:#2c1f14; --accent:#d4793a; --muted:#9a8070; }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    html,body{height:100%;overflow:hidden;}
    body{background:var(--dark);font-family:'DM Sans',sans-serif;display:flex;flex-direction:column;transition:background 0.3s;}

    /* ── TOPBAR ── */
    .topbar{background:var(--dark);display:flex;align-items:center;justify-content:space-between;padding:0.6rem 1rem;flex-shrink:0;gap:0.5rem;border-bottom:1px solid rgba(255,255,255,0.08);}
    .topbar-left{display:flex;align-items:center;gap:0.5rem;}
    .topbar-title{font-family:'Lora',serif;font-style:italic;color:rgba(250,246,240,0.8);font-size:0.85rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;min-width:0;}
    .icon-btn{background:rgba(255,255,255,0.10);border:1px solid rgba(255,255,255,0.15);border-radius:8px;color:#faf6f0;width:36px;height:36px;display:flex;align-items:center;justify-content:center;font-size:1rem;cursor:pointer;flex-shrink:0;-webkit-tap-highlight-color:transparent;transition:background 0.15s;text-decoration:none;}
    .icon-btn:hover,.icon-btn.active{background:rgba(255,255,255,0.22);}

    /* ── HOME LINK ── */
    .home-btn{background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.12);border-radius:8px;color:rgba(250,246,240,0.65);height:36px;padding:0 0.65rem;display:flex;align-items:center;font-size:0.72rem;font-weight:500;gap:0.3rem;cursor:pointer;flex-shrink:0;text-decoration:none;-webkit-tap-highlight-color:transparent;transition:background 0.15s,color 0.15s;white-space:nowrap;}
    .home-btn:hover{background:rgba(255,255,255,0.15);color:#faf6f0;}

    /* ── PROGRESS ── */
    .progress-wrap{height:2px;background:rgba(255,255,255,0.1);flex-shrink:0;}
    .progress-fill{height:100%;background:var(--accent);width:0%;transition:width 0.4s ease;}

    /* ── VIEWER ── */
    #viewer{flex:1;overflow:hidden;background:#fff9f2;position:relative;transition:background 0.3s;}
    #viewer iframe{border:none !important;}
    #loading-overlay{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:inherit;gap:1rem;z-index:10;padding:2rem;text-align:center;}
    .spinner{width:36px;height:36px;border:3px solid var(--tan);border-top-color:var(--accent);border-radius:50%;animation:spin 0.75s linear infinite;}
    @keyframes spin{to{transform:rotate(360deg);}}
    #loading-overlay p{color:var(--muted);font-size:0.88rem;line-height:1.6;}
    #loading-overlay a{color:var(--accent);font-weight:500;}

    /* ── BOTTOM NAV ── */
    .bottombar{background:var(--dark);display:flex;align-items:center;justify-content:space-between;padding:0.5rem 1rem;flex-shrink:0;border-top:1px solid rgba(255,255,255,0.08);gap:0.5rem;}
    .nav-btn{background:rgba(255,255,255,0.10);border:1px solid rgba(255,255,255,0.15);border-radius:8px;color:#faf6f0;padding:0.5rem 1.25rem;font-family:'DM Sans',sans-serif;font-size:0.85rem;font-weight:500;cursor:pointer;-webkit-tap-highlight-color:transparent;transition:background 0.15s,transform 0.1s;white-space:nowrap;}
    .nav-btn:active{transform:scale(0.95);background:rgba(255,255,255,0.22);}
    .nav-btn:disabled{opacity:0.3;cursor:default;}

    /* ── TOC PANEL ── */
    .panel{display:none;position:fixed;bottom:70px;left:50%;transform:translateX(-50%);background:var(--dark);border:1px solid rgba(255,255,255,0.15);border-radius:12px;padding:1rem 1.25rem;z-index:100;gap:0.75rem;align-items:center;box-shadow:0 8px 32px rgba(0,0,0,0.4);white-space:nowrap;}
    .panel.open{display:flex;}
    .panel label{color:rgba(250,246,240,0.7);font-size:0.8rem;}
    .font-step{background:rgba(255,255,255,0.12);border:1px solid rgba(255,255,255,0.18);border-radius:8px;color:#faf6f0;width:38px;height:38px;display:flex;align-items:center;justify-content:center;font-size:1rem;cursor:pointer;-webkit-tap-highlight-color:transparent;}
    .font-step:active{background:rgba(255,255,255,0.25);}
    .font-size-display{color:#faf6f0;font-size:0.9rem;min-width:36px;text-align:center;}
    .toc-panel{display:none;position:fixed;inset:0;z-index:200;}
    .toc-panel.open{display:block;}
    .toc-overlay{position:absolute;inset:0;background:rgba(0,0,0,0.5);}
    .toc-drawer{position:absolute;top:0;left:0;bottom:0;width:min(85vw,320px);background:var(--dark);border-right:1px solid rgba(255,255,255,0.1);overflow-y:auto;padding:1.5rem 1rem;}
    .toc-drawer h3{font-family:'Lora',serif;color:rgba(250,246,240,0.9);font-size:1rem;margin-bottom:1rem;padding-bottom:0.75rem;border-bottom:1px solid rgba(255,255,255,0.1);}
    .toc-item{display:block;color:rgba(250,246,240,0.7);font-size:0.85rem;padding:0.6rem 0.5rem;border-radius:6px;cursor:pointer;text-decoration:none;border:none;background:none;width:100%;text-align:left;transition:background 0.15s,color 0.15s;font-family:'DM Sans',sans-serif;}
    .toc-item:hover,.toc-item:active{background:rgba(255,255,255,0.08);color:#faf6f0;}

    /* ── FEEDBACK BAR ── */
    .feedback-bar{background:var(--accent);text-align:center;padding:0.6rem 1rem;flex-shrink:0;}
    .feedback-bar a{color:#fff;font-size:0.82rem;font-weight:500;text-decoration:none;}
  </style>
</head>
<body>
  <!-- TOC Panel -->
  <div class="toc-panel" id="toc-panel">
    <div class="toc-overlay" onclick="closeToc()"></div>
    <div class="toc-drawer">
      <h3>📖 Chapters</h3>
      <div id="toc-list"><p style="color:var(--muted);font-size:0.82rem;">Loading…</p></div>
    </div>
  </div>

  <!-- Top bar -->
  <div class="topbar">
    <div class="topbar-left">
      <button class="icon-btn" onclick="toggleToc()" title="Table of contents">☰</button>
      <span class="topbar-title">Smile When You Poop</span>
    </div>
    <a href="index.html" class="home-btn" title="Reading options">⌂ All options</a>
  </div>

  <div class="progress-wrap"><div class="progress-fill" id="progress-fill"></div></div>

  <!-- Book viewer -->
  <div id="viewer">
    <div id="loading-overlay">
      <div class="spinner"></div>
      <p id="loading-msg">Opening your book…<br><small style="opacity:0.6;">This may take a moment</small></p>
    </div>
  </div>

  <!-- Bottom nav -->
  <div class="bottombar">
    <button class="nav-btn" id="prev-btn" onclick="prevPage()" disabled>← Prev</button>
    <button class="nav-btn" id="next-btn" onclick="nextPage()" disabled>Next →</button>
  </div>

  <!-- Feedback bar -->
  <div class="feedback-bar">
    <a href="feedback.html">💬 Finished reading? Leave your feedback →</a>
  </div>

  <script src="https://unpkg.com/jszip@3.10.1/dist/jszip.min.js"></script>
  <script src="https://unpkg.com/epubjs@0.3.93/dist/epub.min.js"></script>
  <script>
    var EPUB_URL = 'book.epub';
    var book, rendition;

    function hideLoading() { document.getElementById('loading-overlay').style.display = 'none'; }
    function showError(msg) {
      document.querySelector('.spinner').style.display = 'none';
      document.getElementById('loading-msg').innerHTML = msg + '<br><br><a href="book.epub" download>⬇ Download EPUB instead</a>';
    }
    function prevPage() { if (rendition) rendition.prev(); }
    function nextPage() { if (rendition) rendition.next(); }
    function toggleToc()  { document.getElementById('toc-panel').classList.toggle('open'); }
    function closeToc()   { document.getElementById('toc-panel').classList.remove('open'); }

    document.addEventListener('keydown', function(e) {
      if (e.key === 'ArrowRight') nextPage();
      if (e.key === 'ArrowLeft')  prevPage();
    });

    fetch(EPUB_URL)
      .then(function(res) {
        if (!res.ok) throw new Error('HTTP ' + res.status);
        return res.arrayBuffer();
      })
      .then(function(buffer) {
        book = ePub(buffer);
        rendition = book.renderTo('viewer', { width: '100%', height: '100%', spread: 'none', flow: 'paginated' });

        var timer = setTimeout(function() { showError('Still loading — try refreshing.'); }, 25000);

        rendition.display()
          .then(function() {
            clearTimeout(timer);
            hideLoading();
            document.getElementById('prev-btn').disabled = false;
            document.getElementById('next-btn').disabled = false;
          })
          .catch(function(err) {
            clearTimeout(timer);
            showError('Could not render the book. Try refreshing.');
            console.error(err);
          });

        book.loaded.navigation.then(function(nav) {
          var list = document.getElementById('toc-list');
          list.innerHTML = '';
          if (!nav.toc || !nav.toc.length) { list.innerHTML = '<p style="color:var(--muted);font-size:0.82rem;">No chapters found</p>'; return; }
          nav.toc.forEach(function(item) {
            var btn = document.createElement('button');
            btn.className = 'toc-item';
            btn.textContent = item.label.trim();
            btn.onclick = function() { rendition.display(item.href); closeToc(); };
            list.appendChild(btn);
          });
        });

        rendition.on('relocated', function(loc) {
          document.getElementById('progress-fill').style.width = Math.round((loc.start.percentage || 0) * 100) + '%';
          document.getElementById('prev-btn').disabled = loc.atStart;
          document.getElementById('next-btn').disabled = loc.atEnd;
        });

        var touchStartX = 0;
        rendition.on('touchstart', function(e) { touchStartX = e.changedTouches[0].clientX; });
        rendition.on('touchend',   function(e) {
          var dx = touchStartX - e.changedTouches[0].clientX;
          if (Math.abs(dx) > 50) { if (dx > 0) nextPage(); else prevPage(); }
        });
        rendition.on('keydown', function(e) {
          if (e.key === 'ArrowRight') nextPage();
          if (e.key === 'ArrowLeft')  prevPage();
        });
      })
      .catch(function(err) {
        showError('Could not load <strong>book.epub</strong>. Make sure it is uploaded to Cloudflare.');
        console.error('EPUB load error:', err);
      });
  </script>
</body>
</html>
